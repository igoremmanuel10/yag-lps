<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAG Social — Conexoes reais.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #f8b506;
    --pink: #e91e8c;
    --black: #000000;
    --white: #ffffff;
    --gray: #666666;
    --gray-light: #999999;
  }

  html {
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--black);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Custom gold scrollbar */
  ::-webkit-scrollbar {
    width: 4px;
  }
  ::-webkit-scrollbar-track {
    background: var(--black);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--gold);
    border-radius: 4px;
  }
  html {
    scrollbar-color: var(--gold) var(--black);
    scrollbar-width: thin;
  }

  /* Sections */
  section {
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    position: relative;
    overflow: hidden;
  }

  /* ===== SCREEN 1 — HERO ===== */
  .hero {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
  }

  .hero__bg {
    position: absolute;
    inset: 0;
    background: url('../img/conexao-tres.jpg') center center / cover no-repeat;
    animation: kenBurns1 20s ease-in-out infinite alternate;
    will-change: transform;
  }

  @keyframes kenBurns1 {
    0% { transform: scale(1); }
    100% { transform: scale(1.05); }
  }

  .hero__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(0, 0, 0, 0.85) 0%,
      rgba(0, 0, 0, 0.3) 40%,
      rgba(0, 0, 0, 0.15) 100%
    );
  }

  .hero__logo {
    position: absolute;
    top: 2rem;
    left: 2rem;
    z-index: 10;
  }

  .hero__logo img {
    height: 40px;
    width: auto;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .hero__logo img.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hero__text {
    position: relative;
    z-index: 5;
    text-align: center;
    padding-bottom: 12vh;
  }

  .hero__tagline {
    font-family: 'Sora', sans-serif;
    font-size: 4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--white);
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
  }

  .hero__tagline.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .hero__sub {
    font-family: 'Sora', sans-serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--gold);
    margin-top: 0.6rem;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease 0.6s, transform 1s ease 0.6s;
  }

  .hero__sub.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== SCREEN 2 — PRODUCT ===== */
  .product {
    background: var(--black);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3rem;
  }

  .product__phone-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .product__phone-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .product__phone {
    width: 280px;
    height: auto;
    border-radius: 16px;
    position: relative;
    z-index: 2;
    box-shadow:
      0 0 0 2px rgba(248, 181, 6, 0.15),
      0 20px 60px rgba(0, 0, 0, 0.8),
      0 0 80px rgba(248, 181, 6, 0.08);
  }

  .product__phone-glow {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 60px;
    background: radial-gradient(ellipse, rgba(248, 181, 6, 0.2) 0%, transparent 70%);
    filter: blur(20px);
    z-index: 1;
  }

  .product__phone-reflection {
    position: absolute;
    bottom: -140px;
    left: 50%;
    transform: translateX(-50%) scaleY(-1);
    width: 280px;
    height: 140px;
    overflow: hidden;
    z-index: 0;
    opacity: 0.12;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
    filter: blur(2px);
  }

  .product__phone-reflection img {
    width: 100%;
    height: auto;
    border-radius: 16px;
  }

  .product__features {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.9s ease 0.3s, transform 0.9s ease 0.3s;
  }

  .product__features.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== SCREEN 3 — PRICING ===== */
  .pricing {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1.2rem;
  }

  .pricing__bg {
    position: absolute;
    inset: 0;
    background: url('../img/jantar.jpg') center center / cover no-repeat;
    animation: kenBurns2 20s ease-in-out infinite alternate;
    will-change: transform;
  }

  @keyframes kenBurns2 {
    0% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .pricing__overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.78);
  }

  .pricing__content {
    position: relative;
    z-index: 5;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .pricing__price {
    font-family: 'Sora', sans-serif;
    font-size: 3.5rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }

  .pricing__price.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .pricing__tagline {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.02em;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.9s ease 0.2s, transform 0.9s ease 0.2s;
  }

  .pricing__tagline.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .pricing__cta {
    display: inline-block;
    margin-top: 1.2rem;
    padding: 1rem 3rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--black);
    background: linear-gradient(135deg, var(--gold) 0%, #e5a300 100%);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    opacity: 0;
    transform: translateY(20px);
    box-shadow: 0 4px 30px rgba(248, 181, 6, 0.2);
  }

  .pricing__cta.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.9s ease 0.4s, transform 0.9s ease 0.4s;
  }

  .pricing__cta:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 8px 40px rgba(248, 181, 6, 0.35);
  }

  .pricing__badge {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gray-light);
    margin-top: 1.2rem;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.9s ease 0.6s, transform 0.9s ease 0.6s;
  }

  .pricing__badge.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== SCREEN 4 — FOOTER ===== */
  .footer {
    background: var(--black);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2rem;
  }

  .footer__logo {
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .footer__logo.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .footer__logo img {
    height: 30px;
    width: auto;
  }

  .footer__links {
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--gray);
    opacity: 0;
    transition: opacity 0.8s ease 0.2s;
  }

  .footer__links.visible {
    opacity: 1;
  }

  .footer__links a {
    color: var(--gray);
    text-decoration: none;
    transition: color 0.3s ease;
  }

  .footer__links a:hover {
    color: var(--gold);
  }

  .footer__links span {
    margin: 0 0.8rem;
    color: rgba(255, 255, 255, 0.15);
  }

  .footer__copy {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(255, 255, 255, 0.2);
    opacity: 0;
    transition: opacity 0.8s ease 0.35s;
  }

  .footer__copy.visible {
    opacity: 1;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .hero__logo {
      top: 1.2rem;
      left: 1.2rem;
    }

    .hero__logo img {
      height: 32px;
    }

    .hero__tagline {
      font-size: 2.2rem;
    }

    .hero__sub {
      font-size: 1.1rem;
    }

    .hero__text {
      padding: 0 1.5rem 10vh;
    }

    .product__phone {
      width: 220px;
    }

    .product__phone-reflection {
      width: 220px;
      bottom: -110px;
      height: 110px;
    }

    .product__features {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      padding: 0 1rem;
    }

    .pricing__price {
      font-size: 2rem;
    }

    .pricing__tagline {
      font-size: 0.95rem;
      padding: 0 1.5rem;
    }

    .pricing__cta {
      padding: 0.85rem 2.2rem;
      font-size: 0.85rem;
    }

    .pricing__badge {
      font-size: 0.6rem;
      padding: 0 1.5rem;
    }
  }

  @media (max-width: 380px) {
    .hero__tagline {
      font-size: 1.8rem;
    }

    .hero__sub {
      font-size: 0.95rem;
    }

    .product__phone {
      width: 180px;
    }

    .product__phone-reflection {
      width: 180px;
      bottom: -90px;
      height: 90px;
    }

    .pricing__price {
      font-size: 1.8rem;
    }
  }
</style>
</head>
<body>

<!-- SCREEN 1 — HERO -->
<section class="hero">
  <div class="hero__bg"></div>
  <div class="hero__overlay"></div>
  <div class="hero__logo">
    <img src="../img/logo-app.png" alt="YAG Social">
  </div>
  <div class="hero__text">
    <h1 class="hero__tagline">Conexões reais.</h1>
    <p class="hero__sub">Só pra quem é real.</p>
  </div>
</section>

<!-- SCREEN 2 — PRODUCT -->
<section class="product">
  <div class="product__phone-wrap">
    <img class="product__phone" src="../screenshots/10_feed_mobile.png" alt="YAG Feed">
    <div class="product__phone-glow"></div>
    <div class="product__phone-reflection">
      <img src="../screenshots/10_feed_mobile.png" alt="">
    </div>
  </div>
  <p class="product__features">Feed. Radar. Chat. Eventos.</p>
</section>

<!-- SCREEN 3 — PRICING -->
<section class="pricing">
  <div class="pricing__bg"></div>
  <div class="pricing__overlay"></div>
  <div class="pricing__content">
    <h2 class="pricing__price">R$69,90/mês</h2>
    <p class="pricing__tagline">O preço de ser real.</p>
    <a href="#" class="pricing__cta">Fazer parte</a>
    <p class="pricing__badge">100% verificado &middot; Só assinantes</p>
  </div>
</section>

<!-- SCREEN 4 — FOOTER -->
<section class="footer">
  <div class="footer__logo">
    <img src="../img/logo-app.png" alt="YAG Social">
  </div>
  <div class="footer__links">
    <a href="#">Instagram</a>
    <span>&middot;</span>
    <a href="#">Twitter</a>
  </div>
  <p class="footer__copy">&copy; 2026 YAG Social</p>
</section>

<script>
  // Intersection Observer for reveal animations
  const observerOptions = {
    threshold: 0.15,
    rootMargin: '0px'
  };

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const section = entry.target;
        const animatables = section.querySelectorAll(
          '.hero__logo img, .hero__tagline, .hero__sub, ' +
          '.product__phone-wrap, .product__features, ' +
          '.pricing__price, .pricing__tagline, .pricing__cta, .pricing__badge, ' +
          '.footer__logo, .footer__links, .footer__copy'
        );
        animatables.forEach(el => el.classList.add('visible'));
      }
    });
  }, observerOptions);

  document.querySelectorAll('section').forEach(section => {
    observer.observe(section);
  });
</script>

</body>
</html>
